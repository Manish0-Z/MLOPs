services:
  mysql:
    image: mysql:8.4
    container_name: mlops-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mlops_container
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mlops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlops-mlflow
    entrypoint: >
      sh -c "mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./mlruns"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/app/mlruns
      - ./mlops_pipeline:/app
    working_dir: /app
    depends_on:
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlops-api
    ports:
      - "8000:8000"
    volumes:
      - ./mlops_pipeline:/app
      - ./mlops_pipeline/models:/app/models
      - ./mlops_pipeline/data:/app/data
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=mlops_container
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started

  airflow-redis:
    image: redis:7-alpine
    container_name: mlops-airflow-redis
    ports:
      - "6380:6379"
    volumes:
      - airflow_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: mlops-airflow-init
    command: ["db", "migrate"]
    volumes:
      - ./mlops_pipeline:/opt/airflow/project
      - .:/opt/airflow/data-parent
    environment: &airflow-common
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+pymysql://root:root@mysql:3306/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://airflow-redis:6379/1
      AIRFLOW__CELERY__RESULT_BACKEND: redis://airflow-redis:6379/2
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "True"
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "120"
      AIRFLOW__API__BASE_URL: http://mlops-airflow-webserver:8080
      AIRFLOW__CORE__FERNET_KEY: "CyHdLUdbE8l9fqFlDx9og8G-1qft3y0w2ifzc_dv8cM="
      AIRFLOW__API_AUTH__JWT_SECRET: "XRMcG8NS4Xe2tL5Gx9XVuUs3Lc1mi08-g-Zj2k2-YeI="
      PYTHONPATH: /opt/airflow/project
    depends_on:
      mysql:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: mlops-airflow-webserver
    command: ["api-server", "--port", "8080"]
    ports:
      - "8080:8080"
    volumes:
      - ./mlops_pipeline:/opt/airflow/project
      - .:/opt/airflow/data-parent
    environment:
      <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: mlops-airflow-scheduler
    command: ["scheduler"]
    volumes:
      - ./mlops_pipeline:/opt/airflow/project
      - .:/opt/airflow/data-parent
    environment:
      <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy

  airflow-worker:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: mlops-airflow-worker
    command: ["celery", "worker"]
    volumes:
      - ./mlops_pipeline:/opt/airflow/project
      - .:/opt/airflow/data-parent
    environment:
      <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy

  airflow-dag-processor:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: mlops-airflow-dag-processor
    command: ["dag-processor"]
    volumes:
      - ./mlops_pipeline:/opt/airflow/project
      - .:/opt/airflow/data-parent
    environment:
      <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  airflow_redis_data:
  mlflow_data:
